<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karnataka Times</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Kannada:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="logo">KARNATAKA <span>TIMES</span></div>
        <div id="lastUpdated" class="update-tag">ಅಪ್ಡೇಟ್ ಮಾಡಲಾಗುತ್ತಿದೆ...</div>
    </header>

    <main class="news-grid" id="newsGrid"></main>

    <div id="readerOverlay" class="reader-overlay">
        <div class="reader-bar">
            <button onclick="closeReader()">✕ ಮುಚ್ಚಿ</button>
            <span id="articleSource"></span>
        </div>
        <div id="readerContent" class="reader-body"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
