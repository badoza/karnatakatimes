<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karnataka Times</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Kannada:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="logo">KARNATAKA <span>TIMES</span></div>
        <div id="status" class="status-dot">● LIVE</div>
    </header>

    <main class="feed" id="newsFeed"></main>

    <div id="reader" class="reader-view">
        <div class="reader-nav">
            <button onclick="closeNews()">← ಹಿಂದಕ್ಕೆ</button>
            <span id="sourceInfo"></span>
        </div>
        <div id="readerContent" class="reader-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
