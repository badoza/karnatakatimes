<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karnataka Times - Latest News</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Kannada:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif Kannada', sans-serif; background: #f8fafc; margin: 0; }
        .header { background: #0f172a; color: white; padding: 20px; text-align: center; border-bottom: 4px solid #EA5335; }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: #EA5335; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .news-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }
        .news-content { padding: 15px; }
        .news-content h3 { margin: 0 0 10px 0; color: #0f172a; font-size: 1.2rem; }
        .meta { color: #64748b; font-size: 0.85rem; display: flex; justify-content: space-between; }
        .footer { background: #0f172a; color: white; text-align: center; padding: 20px; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">KARNATAKA <span>TIMES</span></div>
    </div>

    <div class="container">
        <div class="news-grid" id="newsFeed">
            <p>ಸುದ್ದಿಗಳನ್ನು ಲೋಡ್ ಮಾಡಲಾಗುತ್ತಿದೆ...</p>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Karnataka Times. All Rights Reserved.</p>
        <p style="color: #94a3b8; font-style: italic; font-size: 0.9rem;">developed by Kunal Dongare</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
