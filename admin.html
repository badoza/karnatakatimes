<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <title>Karnataka Times - Admin Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e2e8f0; padding: 40px; }
        .admin-box { background: white; max-width: 700px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #0f172a; border-bottom: 3px solid #EA5335; padding-bottom: 10px; }
        label { font-weight: bold; margin-top: 15px; display: block; color: #1e293b; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 5px; box-sizing: border-box;}
        .upload-group { display: flex; gap: 15px; background: #f8fafc; padding: 15px; border: 1px dashed #cbd5e1; border-radius: 5px;}
        .upload-group div { flex: 1; }
        button { background: #EA5335; color: white; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px;}
        button:hover { background: #d94b30; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Publish Karnataka Times News</h2>
        
        <label>Title (ಶೀರ್ಷಿಕೆ)</label>
        <input type="text" id="title" placeholder="Enter headline...">

        <label>Category (ವರ್ಗ)</label>
        <select id="category">
            <option value="STATE">State (ರಾಜ್ಯ)</option>
            <option value="NATIONAL">National (ರಾಷ್ಟ್ರೀಯ)</option>
            <option value="INTERNATIONAL">International (ಅಂತಾರಾಷ್ಟ್ರೀಯ)</option>
            <option value="SPORTS">Sports (ಕ್ರೀಡೆ)</option>
            <option value="AUTO">Auto (ಆಟೋಮೊಬೈಲ್)</option>
            <option value="FINANCE">Finance (ಹಣಕಾಸು)</option>
            <option value="SCHEMES">Schemes (ಯೋಜನೆಗಳು)</option>
        </select>

        <label>Placement on Website</label>
        <select id="placement">
            <option value="standard">Normal Story (Bottom Grid)</option>
            <option value="hero-main">Big Story (Main Top Banner)</option>
            <option value="hero-side">Sub Story (Small Top Banner)</option>
        </select>

        <label>Image Source (Choose ONE)</label>
        <div class="upload-group">
            <div>
                <small>Option 1: Paste Image URL</small>
                <input type="text" id="imageUrl" placeholder="https://...">
            </div>
            <div>
                <small>Option 2: Upload from Computer</small>
                <input type="file" id="imageFile" accept="image/png, image/jpeg, image/webp">
            </div>
        </div>

        <label>Full Content (ಸಂಪೂರ್ಣ ಸುದ್ದಿ)</label>
        <textarea id="content" rows="6" placeholder="Write your full 2-paragraph article here..."></textarea>

        <button onclick="publishNews()" id="pubBtn">Publish Instantly</button>
        <div id="status"></div>
    </div>

    <script>
        // ==========================================
        // PUT YOUR JSONBIN DETAILS HERE
        // ==========================================
        const BIN_ID = 'YOUR_BIN_ID_HERE'; 
        const MASTER_KEY = 'YOUR_MASTER_KEY_HERE'; 
        // ==========================================

        function getBase64(file) {
           return new Promise((resolve, reject) => {
             const reader = new FileReader();
             reader.readAsDataURL(file);
             reader.onload = () => resolve(reader.result);
             reader.onerror = error => reject(error);
           });
        }

        async function publishNews() {
            const status = document.getElementById('status');
            const btn = document.getElementById('pubBtn');
            btn.disabled = true; 
            status.style.color = 'blue'; 
            status.innerText = "Publishing to JSONBin... Please wait.";

            try {
                let finalImg = "https://images.unsplash.com/photo-1585007600263-ad1f34741891?w=800"; // Fallback image
                const file = document.getElementById('imageFile').files[0];
                const url = document.getElementById('imageUrl').value;
                
                if (file) finalImg = await getBase64(file);
                else if (url) finalImg = url;

                const newArticle = {
                    id: Date.now(),
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    placement: document.getElementById('placement').value,
                    image: finalImg,
                    content: document.getElementById('content').value,
                    date: new Date().toLocaleDateString('kn-IN', { day: 'numeric', month: 'short', year: 'numeric' })
                };

                const apiUrl = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
                
                // Fetch the current database
                const getRes = await fetch(apiUrl + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } });
                if (!getRes.ok) throw new Error("Could not connect to JSONBin. Check your keys.");
                const currentData = await getRes.json();
                let db = currentData.record;

                // Make sure the articles array exists
                if (!db.articles) db.articles = [];

                // Add the new article to the top of the list
                db.articles.unshift(newArticle);

                // Save it back to JSONBin
                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                    body: JSON.stringify(db)
                });

                if (putRes.ok) {
                    status.style.color = 'green'; 
                    status.innerText = "Success! The news is live on your website.";
                    // Clear the form
                    document.getElementById('title').value = '';
                    document.getElementById('content').value = '';
                    document.getElementById('imageUrl').value = '';
                    document.getElementById('imageFile').value = '';
                } else {
                    throw new Error("Failed to save to JSONBin.");
                }

            } catch (err) {
                status.style.color = 'red'; 
                status.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
