<script>
        // --- YOUR JSONBIN CONFIGURATION ---
        const BIN_ID = '69bcdb8aaa77b81da9ffa8f5'; 
        const MASTER_KEY = '$2a$10$nzexZyI4UJasFz0OxbIg/u7ssJFZrqheHjEfZkwzHIjOMtqbqEMS2'; 
        // ----------------------------------

        function getBase64(file) {
           return new Promise((resolve, reject) => {
             const reader = new FileReader();
             reader.readAsDataURL(file);
             reader.onload = () => resolve(reader.result);
             reader.onerror = error => reject(error);
           });
        }

        async function publishNews() {
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('pubBtn');
            btn.disabled = true;
            statusDiv.style.color = 'blue';
            statusDiv.innerText = "Connecting to JSONBin... Please wait.";

            try {
                let finalImage = "";
                const fileInput = document.getElementById('imageFile').files[0];
                const urlInput = document.getElementById('imageUrl').value;

                if (fileInput) finalImage = await getBase64(fileInput);
                else if (urlInput) finalImage = urlInput;
                else finalImage = "https://images.unsplash.com/photo-1585007600263-ad1f34741891?w=800"; 

                const newArticle = {
                    id: Date.now(),
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    placement: document.getElementById('placement').value,
                    date: new Date().toLocaleDateString('en-GB'),
                    author: "Admin",
                    image: finalImage,
                    content: document.getElementById('content').value
                };

                const apiUrl = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

                // 1. Fetch current data from JSONBin
                const getResponse = await fetch(apiUrl + '/latest', { 
                    headers: { 'X-Master-Key': MASTER_KEY } 
                });
                
                if(!getResponse.ok) throw new Error("Could not connect to JSONBin. Check your Bin ID and Key.");
                
                const currentData = await getResponse.json();
                
                // JSONBin stores your data inside a "record" object
                let currentJson = currentData.record; 

                // 2. Add new article to the top
                currentJson.articles.unshift(newArticle);

                // 3. Push the updated data back to JSONBin
                const updateResponse = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY 
                    },
                    body: JSON.stringify(currentJson)
                });

                if (updateResponse.ok) {
                    statusDiv.style.color = 'green';
                    statusDiv.innerText = "Success! The news is live instantly.";
                    document.getElementById('title').value = '';
                    document.getElementById('imageUrl').value = '';
                    document.getElementById('imageFile').value = '';
                    document.getElementById('content').value = '';
                } else throw new Error("Failed to update JSONBin.");

            } catch (error) {
                console.error(error);
                statusDiv.style.color = 'red';
                statusDiv.innerText = "Error: " + error.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
