<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <title>Karnataka Times - Admin Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e2e8f0; padding: 40px; }
        .admin-box { background: white; max-width: 700px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #0f172a; border-bottom: 3px solid #EA5335; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #EA5335; color: white; font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
        label { font-weight: bold; margin-top: 20px; display: block; color: #1e293b; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 5px; box-sizing: border-box;}
        .upload-group { display: flex; gap: 15px; background: #f8fafc; padding: 15px; border: 1px dashed #cbd5e1; border-radius: 5px;}
        .upload-group div { flex: 1; }
        button { background: #EA5335; color: white; padding: 15px; border: none; width: 100%; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 25px; transition: 0.3s;}
        button:hover { background: #d94b30; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; padding: 10px; border-radius: 5px;}
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Publishing Portal <span class="badge">v3.0 (GitHub Images)</span></h2>
        
        <label style="color: #EA5335; font-size: 1.1rem;">What are you publishing?</label>
        <select id="postType" onchange="toggleForm()" style="border: 2px solid #EA5335; font-weight: bold;">
            <option value="news">📰 News Article</option>
            <option value="ad-top">⭐ Top Banner Ad (Under Header)</option>
            <option value="ad-mid">🎯 Mid-Page Banner Ad (Between Categories)</option>
        </select>

        <label id="imageLabel">Image / Banner Source (Choose ONE)</label>
        <div class="upload-group">
            <div>
                <small>Option 1: Paste Image URL</small>
                <input type="text" id="imageUrl" placeholder="https://...">
            </div>
            <div>
                <small>Option 2: Upload to GitHub</small>
                <input type="file" id="imageFile" accept="image/png, image/jpeg, image/webp, image/gif">
            </div>
        </div>

        <div id="newsFields">
            <label>Title (ಶೀರ್ಷಿಕೆ)</label>
            <input type="text" id="title" placeholder="Enter headline...">

            <label>Category (ವರ್ಗ)</label>
            <select id="category">
                <option value="STATE">State (ರಾಜ್ಯ)</option>
                <option value="NATIONAL">National (ರಾಷ್ಟ್ರೀಯ)</option>
                <option value="INTERNATIONAL">International (ಅಂತಾರಾಷ್ಟ್ರೀಯ)</option>
                <option value="SPORTS">Sports (ಕ್ರೀಡೆ)</option>
                <option value="AUTO">Auto (ಆಟೋಮೊಬೈಲ್)</option>
                <option value="FINANCE">Finance (ಹಣಕಾಸು)</option>
                <option value="SCHEMES">Schemes (ಯೋಜನೆಗಳು)</option>
            </select>

            <label>Placement on Website</label>
            <select id="placement">
                <option value="standard">Normal Story (Bottom Grid)</option>
                <option value="hero-main">Big Story (Main Top Banner Slider)</option>
                <option value="hero-side">Sub Story (Small Top Banner Locked)</option>
            </select>

            <label>Full Content (ಸಂಪೂರ್ಣ ಸುದ್ದಿ)</label>
            <textarea id="content" rows="6" placeholder="Write your full 2-paragraph article here..."></textarea>
        </div>

        <div id="adFields" class="hidden">
            <label>Ad Target URL (Where should users go when they click the ad?)</label>
            <input type="text" id="adTargetUrl" placeholder="e.g., https://sponsor-website.com">
        </div>

        <button onclick="publishData()" id="pubBtn">Publish to Website</button>
        <div id="status"></div>
    </div>

    <script>
        // ==========================================
        // 1. JSONBIN SETTINGS (For Text Data)
        // ==========================================
        const BIN_ID = '69bcdb8aaa77b81da9ffa8f5'; 
        const MASTER_KEY = '$2a$10$nzexZyI4UJasFz0OxbIg/u7ssJFZrqheHjEfZkwzHIjOMtqbqEMS2'; 
        
        // ==========================================
        // 2. GITHUB SETTINGS (For Image Uploads)
        // ==========================================
        const GITHUB_USER = 'badoza'; 
        const GITHUB_REPO = 'karnatakatimes'; 
        const GITHUB_TOKEN = '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'; // Must have "repo" permission checked
        // ==========================================

        function toggleForm() {
            const type = document.getElementById('postType').value;
            if (type === 'news') {
                document.getElementById('newsFields').classList.remove('hidden');
                document.getElementById('adFields').classList.add('hidden');
                document.getElementById('imageLabel').innerText = "News Image Source (Choose ONE)";
            } else {
                document.getElementById('newsFields').classList.add('hidden');
                document.getElementById('adFields').classList.remove('hidden');
                document.getElementById('imageLabel').innerText = "Upload Advertisement Banner Image";
            }
        }

        // New function: Sends the file to your GitHub repository
        async function uploadImageToGitHub(file) {
            // 1. Convert file to pure Base64 (stripping the data:image prefix)
            const base64Data = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]); 
                reader.onerror = error => reject(error);
            });

            // 2. Create a unique filename so it doesn't overwrite old images
            const ext = file.name.split('.').pop();
            const fileName = `img_${Date.now()}.${ext}`;
            const path = `images/${fileName}`; // Saves it in an "images" folder in your repo

            // 3. Send to GitHub via API
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`;
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Upload image ${fileName} via Admin Portal`,
                    content: base64Data
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(`GitHub Error: ${err.message}`);
            }

            // 4. Return the raw.githubusercontent URL (loads instantly, bypasses Pages build delay)
            return `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${path}`;
        }

        async function publishData() {
            const status = document.getElementById('status');
            const btn = document.getElementById('pubBtn');
            btn.disabled = true; 
            status.style.color = '#1e40af'; 
            status.style.backgroundColor = '#dbeafe';
            status.innerText = "Processing... Please wait.";

            try {
                const postType = document.getElementById('postType').value;
                let finalImg = "https://images.unsplash.com/photo-1585007600263-ad1f34741891?w=800"; 
                
                const file = document.getElementById('imageFile').files[0];
                const url = document.getElementById('imageUrl').value;
                
                // Route 1: If user selected a file, send to GitHub first
                if (file) {
                    status.innerText = "Uploading image to GitHub repository...";
                    finalImg = await uploadImageToGitHub(file);
                } 
                // Route 2: If user pasted a URL, just use that
                else if (url) {
                    finalImg = url;
                }

                status.innerText = "Saving data to JSONBin...";
                const apiUrl = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
                
                const getRes = await fetch(apiUrl + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } });
                if (!getRes.ok) throw new Error("Could not connect to JSONBin.");
                const currentData = await getRes.json();
                let db = currentData.record;

                if (!db.articles) db.articles = [];
                if (!db.ads) db.ads = [];

                if (postType === 'news') {
                    db.articles.unshift({
                        id: Date.now(),
                        title: document.getElementById('title').value,
                        category: document.getElementById('category').value,
                        placement: document.getElementById('placement').value,
                        image: finalImg,
                        content: document.getElementById('content').value,
                        date: new Date().toLocaleDateString('kn-IN', { day: 'numeric', month: 'short', year: 'numeric' })
                    });
                } else {
                    db.ads.unshift({
                        id: Date.now(),
                        type: postType, 
                        image: finalImg,
                        url: document.getElementById('adTargetUrl').value || '#'
                    });
                }

                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                    body: JSON.stringify(db)
                });

                if (putRes.ok) {
                    status.style.color = '#166534'; 
                    status.style.backgroundColor = '#dcfce7';
                    status.innerText = "Success! Published successfully.";
                    
                    document.getElementById('title').value = '';
                    document.getElementById('content').value = '';
                    document.getElementById('imageUrl').value = '';
                    document.getElementById('imageFile').value = '';
                    document.getElementById('adTargetUrl').value = '';
                } else {
                    throw new Error("JSONBin rejected the save request.");
                }

            } catch (err) {
                status.style.color = '#991b1b'; 
                status.style.backgroundColor = '#fee2e2';
                status.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
